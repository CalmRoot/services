name: CI - Build and Security Scan

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  lint-and-test:
    name: Lint and Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, assessment-service, therapist-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.service }}
        run: npm run lint

      - name: Run Tests
        working-directory: ${{ matrix.service }}
        run: npm test

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CalmRoot CI Failed - Lint/Test (${{ matrix.service }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CalmRoot CI Pipeline
          body: |
            Lint or Test failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  sonarcloud:
    name: SonarCloud Analysis - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [auth-service, assessment-service, therapist-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ matrix.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CalmRoot CI Failed - SonarCloud (${{ matrix.service }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CalmRoot CI Pipeline
          body: |
            SonarCloud scan failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  snyk-scan:
    name: Snyk Dependency Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [auth-service, assessment-service, therapist-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install --no-audit --no-fund

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Run Snyk Scan
        working-directory: ${{ matrix.service }}
        run: |
          snyk test \
            --severity-threshold=high \
            --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk Report to HTML
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f snyk-report.json ]; then
            snyk-to-html -i snyk-report.json -o snyk-report.html
          fi

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/snyk-report.html
            ${{ matrix.service }}/snyk-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CalmRoot CI Failed - Snyk (${{ matrix.service }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CalmRoot CI Pipeline
          body: |
            Snyk scan failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  trivy-scan:
    name: Trivy Container Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [auth-service, assessment-service, therapist-service, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build \
            -t ${{ matrix.service }}:scan \
            ./${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CalmRoot CI Failed - Trivy (${{ matrix.service }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CalmRoot CI Pipeline
          body: |
            Trivy container scan failed for: ${{ matrix.service }}
            High or Critical vulnerabilities found. Merge is blocked.

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  scan-summary:
    name: PR Scan Summary
    runs-on: ubuntu-latest
    needs: [sonarcloud, snyk-scan, trivy-scan]
    if: always()
    steps:
      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const sonar = '${{ needs.sonarcloud.result }}';
            const snyk = '${{ needs.snyk-scan.result }}';
            const trivy = '${{ needs.trivy-scan.result }}';
            const status = (r) => r === 'success' ? 'PASSED' : 'FAILED';
            const allPassed = sonar === 'success' && snyk === 'success' && trivy === 'success';
            const body = [
              '## CalmRoot CI Scan Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| SonarCloud Code Quality | ${status(sonar)} |`,
              `| Snyk Dependencies | ${status(snyk)} |`,
              `| Trivy Container Scan | ${status(trivy)} |`,
              '',
              allPassed
                ? 'All checks passed. Safe to merge.'
                : 'One or more checks failed. Fix issues before merging.'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });